<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さとべぇRADIO エピソードカタログ</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #faf9f6;
  --bg2: #f2f0eb;
  --border: #e0ddd5;
  --text: #1a1814;
  --text2: #6b6760;
  --text3: #a09d97;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent2: #8b5e3c;
  --accent2-light: #f5ede4;
  --purple: #4a3f6b;
  --purple-light: #ede9f5;
  --card: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

header {
  padding: 3rem 2rem 2rem;
  max-width: 800px;
  margin: 0 auto;
  border-bottom: 1px solid var(--border);
}

.site-owner {
  text-align: right;
}

.site-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
}

.site-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

/* ▼ 折りたたみUI */
.filter-section {
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

summary {
  cursor: pointer;
  list-style: none;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  font-weight: 500;
}

summary::-webkit-details-marker {
  display: none;
}

summary::after {
  content: "＋";
  float: right;
}

details[open] summary::after {
  content: "−";
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.tag {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  cursor: pointer;
}

.tag.active-mood { background: var(--accent-light); color: var(--accent); }
.tag.active-topic { background: var(--accent2-light); color: var(--accent2); }
.tag.active-series { background: var(--purple-light); color: var(--purple); }

.results-header {
  display: flex;
  justify-content: space-between;
  margin-top: 1.5rem;
  margin-bottom: 1rem;
}

.ep-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 10px;
}

.ep-title {
  font-family: 'Noto Serif JP', serif;
  margin: 6px 0;
}

.ep-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.ep-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg2);
}

.empty {
  text-align: center;
  padding: 2rem;
  color: var(--text3);
}
</style>
</head>

<body>

<header>
  <div class="site-title">さとべぇRADIO エピソードカタログ</div>
  <div class="site-sub">stand.fmで公開中の俳優・松田悟志さんがナビゲートするさとべぇRADIOのエピソードカタログです。</div>
  <div class="site-sub">気分やカテゴリでエピソードを簡単に探せるようにしたいという思いから、このページを作成しました。</div>
  <div class="site-sub">※claudeを使用してタグ付けを行っています。内容に関してご質問やご不明点があれば、<a href="https://forms.gle/43gT93k5hYF9GEjr6" target="_blank">こちら</a>よりご連絡ください。</div>
  <div class="site-sub site-owner">  管理人：かぴこ  &nbsp;&nbsp;<a href="https://x.com/love2wombat" target="_blank">X</a></div>
</header>

<div class="container">

  <!-- ▼ 折りたたみ -->
  <details class="filter-section">
    <summary>気分で探す</summary>
    <div class="tags" id="mood-tags"></div>
  </details>

  <details class="filter-section">
    <summary>テーマで探す</summary>
    <div class="tags" id="topic-tags"></div>
  </details>

  <details class="filter-section">
    <summary>シリーズで探す</summary>
    <div class="tags" id="series-tags"></div>
  </details>

  <div class="results-header">
    <span id="result-count"></span>
    <button onclick="clearAll()">クリア</button>
  </div>

  <div id="results"></div>
</div>

<script>
let episodes = [];
let selMoods  = new Set();
let selTopics = new Set();
let selSeries = new Set();
let allMoods  = [];
let allTopics = [];
let allSeries = [];

fetch('episodes.json')
  .then(r => r.json())
  .then(data => {
    episodes = data;
    allMoods  = [...new Set(episodes.flatMap(e => e.mood))];
    allTopics = [...new Set(episodes.flatMap(e => e.topic))];
    allSeries = [...new Set(episodes.flatMap(e => e.series))];
    renderTags('mood-tags',   allMoods,   selMoods,   'mood');
    renderTags('topic-tags',  allTopics,  selTopics,  'topic');
    renderTags('series-tags', allSeries,  selSeries,  'series');
    renderResults();
  })
  .catch(() => {
    document.getElementById('results').innerHTML =
      '<div class="empty">データの読み込みに失敗しました。</div>';
  });

function renderTags(containerId, tags, selectedSet, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (selectedSet.has(tag) ? ` active-${type}` : '');
    btn.textContent = tag;
    btn.onclick = () => {
      selectedSet.has(tag) ? selectedSet.delete(tag) : selectedSet.add(tag);
      renderTags(containerId, tags, selectedSet, type);
      renderResults();
    };
    el.appendChild(btn);
  });
}

function renderResults() {
  const filtered = episodes.filter(ep => {
    const m = selMoods.size  === 0 || [...selMoods].some(t => ep.mood.includes(t));
    const t = selTopics.size === 0 || [...selTopics].some(t => ep.topic.includes(t));
    const s = selSeries.size === 0 || [...selSeries].some(t => ep.series.includes(t));
    return m && t && s;
  });

  const total = selMoods.size + selTopics.size + selSeries.size;
  document.getElementById('result-count').textContent =
    total === 0 ? `全${episodes.length}件` : `${filtered.length} / ${episodes.length}件`;

  const res = document.getElementById('results');
  if (filtered.length === 0) {
    res.innerHTML = '<div class="empty">該当するエピソードが見つかりませんでした</div>';
    return;
  }

  res.innerHTML = filtered.map(ep => `
    <div class="ep-card">
      <div class="ep-meta">
        <span class="ep-num">#${ep.id}</span>
        <span class="ep-date">${ep.date}</span>
        <span class="ep-length">${ep.length}</span>
      </div>
      <div class="ep-title">${ep.title}</div>
      <div class="ep-tags">
        ${ep.mood.map(t => `<span class="ep-tag mood">${t}</span>`).join('')}
      </div>
      <div class="ep-tags">
        ${ep.topic.map(t => `<span class="ep-tag topic">${t}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function clearAll() {
  selMoods.clear(); selTopics.clear(); selSeries.clear();
  renderTags('mood-tags',   allMoods,   selMoods,   'mood');
  renderTags('topic-tags',  allTopics,  selTopics,  'topic');
  renderTags('series-tags', allSeries,  selSeries,  'series');
  renderResults();
}
</script>

</body>
</html>
