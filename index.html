<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-DFCRNJYD5C"></script>
<script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さとべぇRADIO エピソードカタログ</title>
<link rel="icon" href="favicon.ico" type="image/x-icon">
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --bg2: #f2f0eb;
    --border: #e0ddd5;
    --text: #1a1814;
    --text2: #6b6760;
    --text3: #a09d97;
    --accent: #2d5a3d;
    --accent-light: #e8f0eb;
    --accent2: #8b5e3c;
    --accent2-light: #f5ede4;
    --purple: #4a3f6b;
    --purple-light: #ede9f5;
    --card: #ffffff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 12px;
    line-height: 1.7;
  }
  header {
    padding: 3rem 2rem 2rem;
    max-width: 800px;
    margin: 0 auto;
    border-bottom: 1px solid var(--border);
    
  }
  .site-owner {
  text-align: right;
}
  .site-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    margin-bottom: 0.3rem;
  }
  .site-sub {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 0.04em;
    margin-top: 4px;
  }
  .site-sub a { color: var(--accent); text-decoration: none; }
  .site-sub a:hover { text-decoration: underline; }
  .container {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
  }
  .filter-section { 
      margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;}
  .filter-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    color: var(--text3);
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .tag {
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text2);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: 'Noto Sans JP', sans-serif;
    white-space: nowrap;
  }
  .tag:hover { border-color: var(--accent); color: var(--accent); }
  .tag.active-mood { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }
  .tag.active-topic { background: var(--accent2-light); border-color: var(--accent2); color: var(--accent2); font-weight: 500; }
  .tag.active-series { background: var(--purple-light); border-color: var(--purple); color: var(--purple); font-weight: 500; }
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }
  .results-count { font-size: 12px; color: var(--text3); }
  .clear-btn {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .clear-btn:hover { color: var(--text2); }
  .ep-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem 1.4rem;
    transition: border-color 0.15s, transform 0.1s;
  }
  #results {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

@media (max-width: 600px) {
  #results {
    grid-template-columns: 1fr;
  }
}
  .ep-card:hover { border-color: #c0bdb5; transform: translateY(-1px); }
  .ep-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  .ep-num { font-size: 11px; color: var(--text3); font-family: 'Noto Serif JP', serif; }
  .ep-date { font-size: 11px; color: var(--text3); }
  .ep-length {
    font-size: 11px;
    color: var(--text3);
    background: var(--bg2);
    padding: 2px 7px;
    border-radius: 10px;
  }
  .ep-title {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .ep-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
  .ep-tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--bg2);
    color: var(--text2);
  }
  .ep-tag.mood { background: var(--accent-light); color: var(--accent); }
  .ep-tag.topic { background: var(--accent2-light); color: var(--accent2); }
  .empty {
    text-align: center;
    padding: 3rem 0;
    color: var(--text3);
    font-size: 13px;
    grid-column: 1 / -1;
  }
  .loading {
    text-align: center;
    padding: 3rem 0;
    color: var(--text3);
    font-size: 13px;
    grid-column: 1 / -1;
  }
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }
  @media (max-width: 600px) {
    header { padding: 2rem 1.2rem 1.5rem; }
    .container { padding: 1.2rem; }
    .site-title { font-size: 1.3rem; }
  }
  summary {
  cursor: pointer;
  list-style: none;
}

summary::-webkit-details-marker {
  display: none;
}

.ep-card summary {
  display: block;
}

.ep-card[open] {
  background: var(--bg2);
}
  .ep-link {
  margin-top: 10px;
}

.ep-link a {
  display: inline-block;
  font-size: 12px;
  color: var(--accent);
  text-decoration: none;
  border: 1px solid var(--accent);
  padding: 4px 10px;
  border-radius: 20px;
  transition: all 0.15s;
}

.ep-link a:hover {
  background: var(--accent);
  color: #fff;
}
  .fav-btn {
  cursor: pointer;
  font-size: 16px;
  margin-left: auto;
}

.fav-btn.active {
  color: gold;
}
  .header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
}

.fav-toggle {
  font-size: 12px;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text2);
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s ease;
}

.fav-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.fav-toggle.active {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
  font-weight: 500;
}
  .search-box {
  width: 100%;
  padding: 10px 16px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 11px;
  color: var(--text);
  background: var(--card);
  outline: none;
  transition: border-color 0.15s;
  margin-bottom: 1rem;
}
  .search-box::placeholder {
  font-size: 11px;
  color: var(--text3);
}
.search-box:focus {
  border-color: var(--accent);
}
</style>
</head>
<body>

<header>
  <div class="site-title">さとべぇRADIO エピソードカタログ</div>
  <div class="site-sub">stand.fmで公開中の俳優・松田悟志さんがナビゲートする<a href="https://stand.fm/channels/66af35be23b8a44778d8961f" target="_blank">さとべぇRADIO</a>のエピソードカタログです。</div>
  <div class="site-sub">気分やカテゴリでエピソードを簡単に探せるようにしたいという思いから、このページを作成しました。</div>
  <div class="site-sub">※WhisperとClaudeを使用してタグ付けを行っています。内容に関して何かありましたら、<a href="https://forms.gle/43gT93k5hYF9GEjr6" target="_blank">こちら</a>よりご連絡ください。</div>
  <div class="site-sub site-owner">  管理人：かぴこ  &nbsp;&nbsp;<a href="https://x.com/love2wombat" target="_blank">X</a></div>
</header>
<div class="container">
  <input
  type="text"
  class="search-box"
  id="search-input"
  placeholder="エピソードを検索..."
  oninput="renderResults()"
>
<details class="filter-section">
  <summary class="filter-label">気分で探す</summary>
    <div class="tags" id="mood-tags"></div>
  </details>
<details class="filter-section">
  <summary class="filter-label">シーン別で探す</summary>
    <div class="tags" id="recommend-tags"></div>
  </details>
<details class="filter-section">
  <summary class="filter-label">テーマで探す</summary>
    <div class="tags" id="topic-tags"></div>
  </details>
<details class="filter-section">
  <summary class="filter-label">シリーズで探す</summary>
  <div class="tags" id="series-tags"></div>
  </details>
  <hr class="divider">
  <div class="results-header">
    <span class="results-count" id="result-count"></span>
    <button class="clear-btn" onclick="clearAll()">条件をクリア</button>
    <button class="fav-toggle" onclick="toggleFavoritesView()">★ お気に入りだけ表示</button>
  </div>
  <div id="results"><div class="loading">読み込み中...</div></div>
</div>

<script>
let episodes = [];
let selMoods  = new Set();
let selTopics = new Set();
let selSeries = new Set();
let selRecommends = new Set();
let allRecommends = [];
let allMoods  = [];
let allTopics = [];
let allSeries = [];
let favorites = new Set(JSON.parse(localStorage.getItem('favorites') || '[]'));
let showFavoritesOnly = false;

fetch('episodes.json')
  .then(r => r.json())
  .then(data => {
    episodes = data;
    allMoods  = [...new Set(episodes.flatMap(e => e.mood))];
    allTopics = [...new Set(episodes.flatMap(e => e.topic))];
    allSeries = [...new Set(episodes.flatMap(e => e.series))];
    allRecommends = [...new Set(episodes.flatMap(e => e.recommend))];
    renderTags('recommend-tags', allRecommends, selRecommends, 'recommend');
    renderTags('mood-tags',   allMoods,   selMoods,   'mood');
    renderTags('topic-tags',  allTopics,  selTopics,  'topic');
    renderTags('series-tags', allSeries,  selSeries,  'series');
    renderResults();
  })
  .catch(() => {
    document.getElementById('results').innerHTML =
      '<div class="empty">データの読み込みに失敗しました。</div>';
  });

function renderTags(containerId, tags, selectedSet, type) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';

  tags.forEach(tag => {
    const btn = document.createElement('button');
    btn.className = 'tag' + (selectedSet.has(tag) ? ` active-${type}` : '');
    btn.textContent = tag;

    btn.onclick = () => {
      selectedSet.has(tag) ? selectedSet.delete(tag) : selectedSet.add(tag);
      renderTags(containerId, tags, selectedSet, type);
      renderResults();
    };

    el.appendChild(btn);
  });
}

function renderResults() {
const query = document.getElementById('search-input')?.value.trim().toLowerCase() ?? '';
const filtered = episodes.filter(ep => {
  const m = selMoods.size  === 0 || [...selMoods].some(t => ep.mood.includes(t));
  const t = selTopics.size === 0 || [...selTopics].some(t => ep.topic.includes(t));
  const s = selSeries.size === 0 || [...selSeries].some(t => ep.series.includes(t));
  const r = selRecommends.size === 0 || [...selRecommends].some(t => ep.recommend.includes(t));
  const f = !showFavoritesOnly || favorites.has(ep.id);
  const q = query === '' || 
  ep.title.toLowerCase().includes(query) ||
  ep.mood.some(t => t.includes(query)) ||
  ep.topic.some(t => t.includes(query)) ||
  ep.recommend.some(t => t.includes(query)) ||
  ep.series.some(t => t.includes(query));
  return m && t && r && s && f && q;
});

  const total = selMoods.size + selTopics.size + selSeries.size;
  document.getElementById('result-count').textContent =
    total === 0 && query === '' ? `全${episodes.length}件` : `${filtered.length} / ${episodes.length}件`;

  const res = document.getElementById('results');
  if (filtered.length === 0) {
    res.innerHTML = '<div class="empty">該当するエピソードが見つかりませんでした</div>';
    return;
  }

  res.innerHTML = filtered.map(ep => `
<details class="ep-card">
  <summary>
    <div class="ep-meta">
      <span class="ep-num">#${ep.id}</span>
      <span class="ep-date">${ep.date}</span>
      <span class="ep-length">${ep.length}</span>
      <span class="fav-btn ${favorites.has(ep.id) ? 'active' : ''}" 
            onclick="toggleFavorite(${ep.id})">
        ${favorites.has(ep.id) ? '★' : '☆'}
      </span>
    </div>
    <div class="ep-title">${ep.title}</div>
  </summary>

  <div class="ep-tags">
    ${ep.mood.map(t => `<span class="ep-tag mood">${t}</span>`).join('')}
  </div>
  <div class="ep-tags">
    ${ep.topic.map(t => `<span class="ep-tag topic">${t}</span>`).join('')}
  </div>
${ep.url 
  ? `<div class="ep-link">
       <a href="${ep.url}" target="_blank">▶ 再生する</a>
     </div>`
  : `<div class="ep-link" style="color:#aaa;font-size:12px;">
       ※リンク準備中
     </div>`
}
</details>
  `).join('');
}

function clearAll() {
  selMoods.clear(); selTopics.clear(); selSeries.clear(); selRecommends.clear();
  document.getElementById('search-input').value = ''; // ← これを追加
  renderTags('mood-tags',   allMoods,   selMoods,   'mood');
  renderTags('topic-tags',  allTopics,  selTopics,  'topic');
  renderTags('series-tags', allSeries,  selSeries,  'series');
  renderTags('recommend-tags', allRecommends, selRecommends, 'recommend');
  renderResults();
}
  function toggleFavorite(id) {
  if (favorites.has(id)) {
    favorites.delete(id);
  } else {
    favorites.add(id);
  }
  localStorage.setItem('favorites', JSON.stringify([...favorites]));
  renderResults();
}

function toggleFavoritesView() {
  showFavoritesOnly = !showFavoritesOnly;
  renderResults();
}
</script>
</body>
</html>
