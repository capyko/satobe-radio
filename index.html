<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>さとべぇRADIO エピソードカタログ</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #faf9f6;
  --bg2: #f2f0eb;
  --border: #e0ddd5;
  --text: #1a1814;
  --text2: #6b6760;
  --text3: #a09d97;
  --accent: #2d5a3d;
  --accent-light: #e8f0eb;
  --accent2: #8b5e3c;
  --accent2-light: #f5ede4;
  --purple: #4a3f6b;
  --purple-light: #ede9f5;
  --card: #ffffff;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
}

header {
  padding: 3rem 2rem 2rem;
  max-width: 800px;
  margin: 0 auto;
  border-bottom: 1px solid var(--border);
}

.site-owner {
  text-align: right;
}

.site-title {
  font-family: 'Noto Serif JP', serif;
  font-size: 1.6rem;
  font-weight: 700;
}

.site-sub {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
}

.container {
  max-width: 800px;
  margin: 0 auto;
  padding: 2rem;
}

/* ▼ 折りたたみUI */
.filter-section {
  margin-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0.5rem;
}

summary {
  cursor: pointer;
  list-style: none;
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text3);
  text-transform: uppercase;
  font-weight: 500;
}

summary::-webkit-details-marker {
  display: none;
}

summary::after {
  content: "＋";
  float: right;
}

details[open] summary::after {
  content: "−";
}

.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}

.tag {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--card);
  font-size: 12px;
  cursor: pointer;
}

.tag.active-mood { background: var(--accent-light); color: var(--accent); }
.tag.active-topic { background: var(--accent2-light); color: var(--accent2); }
.tag.active-series { background: var(--purple-light); color: var(--purple); }

.results-header {
  display: flex;
  justify-content: space-between;
  margin-top: 1.5rem;
  margin-bottom: 1rem;
}

.ep-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  margin-bottom: 10px;
}

.ep-title {
  font-family: 'Noto Serif JP', serif;
  margin: 6px 0;
}

.ep-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.ep-tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--bg2);
}

.empty {
  text-align: center;
  padding: 2rem;
  color: var(--text3);
}
</style>
</head>

<body>

<header>
  <div class="site-title">さとべぇRADIO エピソードカタログ</div>
  <div class="site-sub">stand.fmで公開中の俳優・松田悟志さんのラジオまとめ</div>
  <div class="site-sub site-owner">管理人：かぴこ</div>
</header>

<div class="container">

  <!-- ▼ 折りたたみ -->
  <details class="filter-section">
    <summary>気分で探す</summary>
    <div class="tags" id="mood-tags"></div>
  </details>

  <details class="filter-section">
    <summary>テーマで探す</summary>
    <div class="tags" id="topic-tags"></div>
  </details>

  <details class="filter-section">
    <summary>シリーズで探す</summary>
    <div class="tags" id="series-tags"></div>
  </details>

  <div class="results-header">
    <span id="result-count"></span>
    <button onclick="clearAll()">クリア</button>
  </div>

  <div id="results"></div>
</div>

<script>
let episodes = [];
let selMoods = new Set();
let selTopics = new Set();
let selSeries = new Set();

fetch('episodes.json')
.then(r => r.json())
.then(data => {
  episodes = data;
  renderTags('mood-tags', [...new Set(data.flatMap(e => e.mood))], selMoods, 'mood');
  renderTags('topic-tags', [...new Set(data.flatMap(e => e.topic))], selTopics, 'topic');
  renderTags('series-tags', [...new Set(data.flatMap(e => e.series))], selSeries, 'series');
  renderResults();
});

function renderTags(id, tags, selected, type) {
  const el = document.getElementById(id);
  el.innerHTML = '';
  tags.forEach(tag => {
    const b = document.createElement('button');
    b.className = 'tag' + (selected.has(tag) ? ` active-${type}` : '');
    b.textContent = tag;
    b.onclick = () => {
      selected.has(tag) ? selected.delete(tag) : selected.add(tag);
      renderTags(id, tags, selected, type);
      renderResults();
    };
    el.appendChild(b);
  });
}

function renderResults() {
  const filtered = episodes.filter(ep => {
    return (!selMoods.size || ep.mood.some(m => selMoods.has(m)))
        && (!selTopics.size || ep.topic.some(t => selTopics.has(t)))
        && (!selSeries.size || ep.series.some(s => selSeries.has(s)));
  });

  document.getElementById('result-count').textContent =
    `${filtered.length} / ${episodes.length}`;

  const res = document.getElementById('results');

  if (!filtered.length) {
    res.innerHTML = '<div class="empty">見つかりません</div>';
    return;
  }

  res.innerHTML = filtered.map(ep => `
    <div class="ep-card">
      <div>${ep.id} / ${ep.date}</div>
      <div class="ep-title">${ep.title}</div>
      <div class="ep-tags">
        ${ep.mood.map(m => `<span class="ep-tag">${m}</span>`).join('')}
      </div>
    </div>
  `).join('');
}

function clearAll() {
  selMoods.clear();
  selTopics.clear();
  selSeries.clear();
  location.reload();
}
</script>

</body>
</html>
